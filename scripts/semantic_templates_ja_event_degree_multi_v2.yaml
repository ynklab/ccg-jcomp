- category: S
  rule: ">"
  semantics: \L R C1 C2 C3 K1. Most(\x.L(\C3 C4 K2.exists e1.K2(\e2.(Nom(e2) = x),e1),C1,C2,C3,\I.I), \x.exists e3.K1(\e4.(Nom(e4) = x),e3))
  child0_category: S/S
  child1_surf: ほとんど

- category: S\NP
  rule: ">Bx1"
  semantics: \L V1 Q C1 C2 C3 K. Most(\y.Q(\I.I,\x.(x = y)), \y.V1(\F1 F2.F2(y),C1,C2,C3,K))
