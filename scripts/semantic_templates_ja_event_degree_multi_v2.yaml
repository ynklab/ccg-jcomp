- category: NP/NP
  rule: <
  semantics: \L R Q N F. Most(\x.(Q(\G.N(\y.(G(y) & (y = x))), \x.True)), F)
  child0_surf: 大勢
  child1_surf: の

- category: NP/NP
  rule: <
  semantics: \L R Q. Q
  child0_surf: 誰
  child1_surf: か

- category: NP
  rule: <
  semantics: \L R N F. Most(\x.N(\y.True,x),F)
  child0_surf: ほとんど
