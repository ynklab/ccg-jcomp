#### Semantic templates for Japanese #####

# Basic logical form:
# x-ga y-o E-suru \C1 C2 C3 K. exists e. (K(E,e) & C1(x,e,Nom) & C2(y,e,Acc))

# Type T ::= Entity | Event | Degree | Prop | T1 -> T2

# Variable     Type
# x,y,z,x1,x2  Entity, E
# e,e1,e2      Event, Ev
# d            Degree, D
# F,G,F1,F2    E -> Prop
# J,J1,J2      Ev -> Prop
# N,N1,N2      (E -> Prop) -> E -> Prop (= Nmod)
# K,K1,K2      (Ev -> Prop) -> Ev -> Prop (= Vmod)
# Q,Q1,Q2      Nmod -> (E -> Prop) -> Prop (= NP*)
# C1,C2,C3     Entity -> Event -> (Event -> Entity) -> Prop (= Role)
# S,S1,S2      Role -> Role -> Role -> Vmod -> Prop (= S*)
# V1           (Nmod -> (E -> Prop) -> Prop) -> Role -> Role -> Role -> Vmod -> Prop (= NP* -> S*)
# V2           (Nmod -> (E -> Prop) -> Prop) -> (Nmod -> (E -> Prop) -> Prop) -> Role -> Role -> Role -> Vmod -> Prop (= NP* -> NP* -> S*)
# E            expression (surface form)
# A(Adjective) E -> D -> Prop
# F31 F32      D -> D
# F4           Prop -> Prop
# N3           (E -> D -> Prop) -> (D -> D) -> E -> Prop (= Ainfo)
# S3           Ainfo -> S* (= S**)
#              Ainfo -> NP* (= NP**)
#              (Ainfo -> E -> Prop) -> (E -> Prop) -> Prop (= NP***)
# M            NP* -> NP**

# Constant          Type
# Nom,Acc,Dat,Attr  Event -> Entity
# AccI              Event -> Prop -> Prop

# Cat         Term : Type
# S           \C1 C2 C3 K. exists e. K(E,e) : Role -> Role -> Role -> Vmod -> Prop (= S*)
# NP          \N F. Det(\x.N(E,x), F) : NMod -> (E -> Prop) -> Prop (= NP*)
# S\NP        \Q C1 C2 C3 K. exists e. Q(\I.I, \x.exists e.(K(E,e) & C1(x,e,Nom))) : NP* -> S*
# S\NP\NP     \Q1 Q2 C1 C2 C3 K. exists e. Q2(\I.I, \y.Q1(\I.I, \x.exists e.(K(E,e) & C1(x,e,Nom) & C2(y,e,Acc)))) : NP* -> NP* -> S*
# S\NP\NP\NP  \Q1 Q2 Q3 C1 C2 C3 K. exists e. Q3(\I.I,\z.Q2(\I.I, \y.Q1(\I.I, \x.exists e.(K(E,e) & C1(x,e,Nom)
#                & C2(y,e,Acc) & C3(z,e,Dat))))) : NP* -> NP* -> NP* -> S*
# S/S         \S C1 C2 C3 K. S(C1,C2,C3,\J e1.K(\e2.(J(e2) & E(e2)),e1)) : S* -> S* (extensional modification)
# S/S         \S C1 C2 C3 K. S(C1,C2,C3,\J e.K(E(J),e)) : S* -> S* (intensional modification)
# NP/NP       \Q N F. Q(\G x. N(\y.(E(y) & G(y)),x), F) : NP* -> NP* (extensional modification)
# NP/NP       \Q N F. Q(\G x. N(E(G),x), F) : NP* -> NP* (intensional modification)
# S\NP [形容詞]
#             \Q N3 C1 C2 C3 K. Q(\I.I, \x. N3(E, \d. d, \d. d, \t. t, x))
#               : NP* -> S**
# NP/NP [形容詞]
#             \Q N3 N F. Q(\G x. N(\y. (G(y) & N3(Adjective, \d. d, y)), x), F)
#               : NP* -> NP**
# (S/S)\NP [より]
#             \Q S3 C1 C2 C3 K. S3(\A F31 F32 F4 x. Q(\I.I, \y. exists d. (A(x, d) & -A(y, d))), C1, C2, C3, K)
#               : NP* -> S** -> S*
# ((NP/NP)/(NP/NP))\(S/NP) [より]
#             \Q S3 C1 C2 C3 K. S3(\A F31 F32 F4 x. Q(\I.I, \y. exists d. (A(x, d) & $less(F3(y), F3(d)))), C1, C2, C3, K)
#               : (NP* -> S*) -> (NP* -> NP**) -> NP* -> NP*
# ((NP/NP)/(NP/NP))\NP [より]
#             \V1 M Q N F. V1(\G1 G2. exists d. (M(Q, \A F31 F32 F4 x. (A(x, d) & F(x)), N, F) & -M(Q, \A F31 F32 F4 x. (A(x, d) & G2(x)), N, \x.True)), \x e T. (T(e) = x), \x e T. (T(e) = x), \x e T. (T(e) = x), \I.I)
#               : NP* -> (NP* -> NP**) -> NP* -> NP*
# (NP/NP)\NP [と同じ]
#             \Q1 Q2 N F. Q2(\A z. N(\y. Q1(\I.I, \x. forall d. (A(x, d) <-> A(y, d))), z), F)
#               : NP* -> NP*** -> NP*

##### Unary lexical rules #####

# S\NP ==> NP/NP 
- category: NP/NP
  rule: ADNint
  child0_category: S\NP
  semantics: \V1 Q N F P. P(Q(\G.N(\y.(G(y) & V1(\G1 G2 P.G2(y), \x e T.(T(e) = x), \x e T.(T(e) = x), \x e T.(T(e) = x), \I.I, \f s.f))), F, \f s.f), Q(\G.N(\y.(G(y) & V1(\G1 G2 P.G2(y), \x e T.(T(e) = x), \x e T.(T(e) = x), \x e T.(T(e) = x), \I.I, \f s.s))), F, \f s.s))

- category: NP/NP
  rule: ADNint
  child0_category: S\NP
  child0_pos: 形容詞
  # semantics: \V1 Q N3 N F. Q(\G.N(\y.(G(y) & V1(\G1 G2.G2(y), N3, \x e T.(T(e) = x), \x e T.(T(e) = x), \x e T.(T(e) = x), \I.I))), F)
  semantics: \V1 Q N3 N F P. P(Q(\G.N(\y.(G(y) & V1(\G1 G2 P.G2(y), N3, \x e T.(T(e) = x), \x e T.(T(e) = x), \x e T.(T(e) = x), \I.I, \f s.f))), F, \f s.f), Q(\G.N(\y.(G(y) & V1(\G1 G2 P.G2(y), N3, \x e T.(T(e) = x), \x e T.(T(e) = x), \x e T.(T(e) = x), \I.I, \f s.s))), F, \f s.f))

- category: NP/NP
  rule: ADNint
  child0_category: S\NP
  child0_child0_pos1: 形容動詞語幹
  semantics: \V1 Q N3 N F P. P(Q(\G.N(\y.(G(y) & V1(\G1 G2 P.G2(y), N3, \x e T.(T(e) = x), \x e T.(T(e) = x), \x e T.(T(e) = x), \I.I, \f s.f))), F, \f s.f), Q(\G.N(\y.(G(y) & V1(\G1 G2 P.G2(y), N3, \x e T.(T(e) = x), \x e T.(T(e) = x), \x e T.(T(e) = x), \I.I, \f s.s))), F, \f s.f))

# S ==> NP/NP
- category: NP/NP
  rule: ADNext
  semantics: \S Q N F. Q(\I.I, \x.(Content(x,\K.S(\x e T.(T(e) = x), \x e T.(T(e) = x), \x e T.(T(e) = x), K)) & F(x)))

# S ==> NP/NP
- category: NP/NP
  rule: ADNext
  semantics: \S Q N F. Q(\G.N(\x.(G(x) & (S(\x e T.(T(e) = x), \x e T.(T(e) = x), \x e T.(T(e) = x), \J e.(J(e) & ((Nom(e) = x))))))), F)
  child0_any_category: S\NP[case=nc]

# S ==> NP/NP
- category: NP/NP
  rule: ADNext
  semantics: \S Q N F. Q(\G.N(\x.(G(x) & (S(\x e T.(T(e) = x), \x e T.(T(e) = x), \x e T.(T(e) = x), \J e.(J(e) & ((Nom(e) = x))))))), F)
  child0_any_pos: "形容詞"

# S ==> NP/NP
- category: NP/NP
  rule: ADNext
  semantics: \S Q N F. Q(\G.N(\x.(G(x) & (S(\x e T.(T(e) = x), \x e T.(T(e) = x), \x e T.(T(e) = x), \J e.(J(e) & ((Nom(e) = x))))))), F)
  child0_any_category: S\S[form=da]

# NP ==> S/S
- category: S/S
  rule: ADV0
  semantics: \Q S C1 C2 C3 K. S(C1,C2,C3,\J e1.K(\e2.(J(e2) & Q(\I.I,\x.Mod(x,e2))),e1))
  child0_category: NP

# S ==> S/S
- category: S/S
  rule: ADV0
  semantics: \S1 S2 C1 C2 C3 K. (S1(C1,C2,C3,K) & S2(C1,C2,C3,K))
  child0_category: S


##### Binary lexical rules #####

- category: NP/NP
  rule: <
  semantics: \L R Q N F P. P(forall x.(Q(\G.N(\y.(G(y) & (x = y))), \y.True, \f s.f) -> F(x)), Q(\F x.True, \x.True, \f s.s))
  child0_surf: すべて
  child1_surf: の

- category: NP/NP
  rule: <
  semantics: \L R Q N F. forall x.(Q(\G.N(\y.(G(y) & (x = y))), \y.True) -> F(x))
  child0_surf: 各々
  child1_surf: の

- category: NP/NP
  rule: <
  semantics: \L R Q N F. forall x.(Q(\G.N(\y.(G(y) & (x = y))), \y.True) -> F(x))
  child0_surf: それぞれ
  child1_surf: の

- category: S/S
  rule: <
  semantics: \Q R S C1 C2 C3 K. forall x.(Q(\I.I, \y.(x = y)) -> S(C1,C2,C3,\J e1.K(\e2.(J(e2) & (Nom(e2) = x)),e1)))
  child0_any_surf: どちら
  child1_surf: も

- category: NP
  rule: <
  semantics: \Q R N F. forall x.(Q(\G.N(\y.(G(y) & (y = x))),\x.True) -> F(x))
  child0_any_surf: どちら
  child1_surf: も

- category: NP
  rule: <
  semantics: \Q R N F. forall x.(Q(\G.N(\y.(G(y) & (y = x))),\x.True) -> F(x))
  child0_any_surf: どの
  child1_surf: も 

- category: NP
  rule: <
  semantics: \Q R N F. forall x.(Q(\G.N(\y.(G(y) & (y = x))),\x.True) -> F(x))
  child0_any_surf: 誰
  child1_surf: も

- category: NP
  rule: <
  semantics: \Q R N F. forall x.(Q(\G.N(\y.(G(y) & (y = x))),\x.True) -> F(x))
  child0_any_surf: 何
  child1_surf: も

- category: NP/NP
  rule: <
  semantics: \L R Q N F. Most(\x.(Q(\G.N(\y.(G(y) & (y = x))), \x.True)), F)
  child0_surf: ほとんど
  child1_surf: の

- category: NP/NP
